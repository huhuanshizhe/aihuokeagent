<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>公开 API 文档 — AI获客</title>
  <link rel="stylesheet" href="/theme.css">
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.18.2/swagger-ui.css">
  <style>
    body { margin: 0; background: #FFFDF8; }
    .docs-shell { max-width: 1200px; margin: 0 auto; padding: 0 16px 48px; }
    .docs-banner {
      margin: 16px 0 8px;
      padding: 12px 16px;
      border: 1px solid #E8E0D0;
      border-radius: 12px;
      background: #FCFAF7;
      font-size: 14px;
      color: #475569;
      line-height: 1.6;
    }
    .docs-banner code {
      font-size: 12px;
      background: #fff;
      border: 1px solid #E8E0D0;
      border-radius: 6px;
      padding: 1px 6px;
    }
    .docs-error { padding: 24px; color: #b91c1c; }
    .swagger-ui .topbar { display: none; }
    .swagger-ui .info { margin: 16px 0; }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="container">
      <h1>AI 获客系统</h1>
      <nav>
        <a href="/">扫描</a>
        <a href="/enrich.html">补全</a>
        <a href="/pipeline.html">全流程</a>
        <a href="/resources.html">资源中心</a>
        <a href="/public-scan.html">公开 API</a>
        <a href="/public-scan-logs.html">调用记录</a>
        <a href="/api-doc" class="active">API 文档</a>
      </nav>
    </div>
  </header>

  <div class="docs-shell">
    <div class="docs-banner">
      OpenAPI 3.1 公开契约。规范 JSON：
      <a href="/api/openapi.json"><code>/api/openapi.json</code></a>
      · 别名 <a href="/api/openapi"><code>/api/openapi</code></a>
      · 调试页 <a href="/public-scan.html">公开 API</a>
    </div>
    <div id="swagger-root">
      <p style="padding: 24px; color: #64748b;">正在加载 API 文档…</p>
    </div>
  </div>

  <script src="https://unpkg.com/swagger-ui-dist@5.18.2/swagger-ui-bundle.js" crossorigin></script>
  <script>
    (async function () {
      const root = document.getElementById('swagger-root');
      try {
        const res = await fetch('/api/openapi.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('Failed to load OpenAPI spec (' + res.status + ')');
        const spec = await res.json();
        root.innerHTML = '';
        window.ui = SwaggerUIBundle({
          spec: spec,
          dom_id: '#swagger-root',
          deepLinking: true,
          docExpansion: 'list',
          defaultModelsExpandDepth: 1,
          tryItOutEnabled: true,
          persistAuthorization: true,
        });
      } catch (err) {
        root.innerHTML = '<p class="docs-error">' + (err && err.message ? err.message : String(err)) + '</p>';
      }
    })();
  </script>
</body>
</html>
