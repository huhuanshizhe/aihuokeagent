<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 获客 - 公开 API 调用记录</title>
  <link rel="stylesheet" href="/theme.css">
  <style>
    .panel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .panel-head h2 { margin-bottom: 0; }
    .panel-sub { margin-top: 6px; margin-bottom: 0; }

    .filters {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr 1.2fr 0.9fr 0.9fr auto auto;
      gap: 10px;
      align-items: end;
      margin-bottom: 14px;
    }
    @media (max-width: 960px) {
      .filters { grid-template-columns: 1fr 1fr; }
    }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--muted);
    }
    .field input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      font-size: 13px;
      background: white;
      color: var(--ink);
    }
    .field input:focus {
      outline: none;
      border-color: var(--accent-border);
      box-shadow: 0 0 0 3px rgba(154, 122, 28, 0.08);
    }

    .btn-link {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      padding: 0;
      min-height: auto;
    }
    .btn-link:hover { text-decoration: underline; }

    #statusBar.status-bar { display: none; }
    #statusBar.status-info,
    #statusBar.status-error { display: block; }

    .table-shell table { min-width: 820px; }
    .user-sub { color: #94a3b8; font-size: 11px; margin-top: 2px; }

    .pager {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .pager .meta { font-size: 13px; color: var(--muted); }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.42);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
      padding: 16px;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      width: min(780px, 100%);
      max-height: calc(100vh - 2rem);
      overflow: hidden;
      background: var(--cream);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.18);
      display: flex;
      flex-direction: column;
    }
    .modal-scroll { overflow: auto; padding: 20px 24px 28px; }
    .modal-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .modal-title { font-size: 16px; font-weight: 700; color: var(--ink); }
    .modal-meta { margin-top: 6px; font-size: 13px; color: var(--muted); line-height: 1.6; }
    .icon-close {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: white;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }
    .icon-close:hover { background: var(--cream-soft); color: var(--ink); }

    .stat-row {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .cols-2 {
      margin-top: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-items: start;
    }
    @media (max-width: 720px) {
      .stat-row, .cols-2 { grid-template-columns: 1fr; }
    }
    .section-box {
      margin-top: 10px;
      border: 1px solid var(--line);
      background: white;
      border-radius: 16px;
      padding: 14px;
      min-height: 96px;
    }
    .tag-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
    .kv {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 8px 10px;
      font-size: 13px;
    }
    .kv .k { color: var(--muted); }
    .kv .v { color: var(--ink); word-break: break-all; }

    .source-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 148px;
      border: 1px solid var(--line);
      background: var(--cream-card);
      border-radius: 999px;
      padding: 8px 12px;
    }
    .source-pill .name {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      color: #475569;
    }
    .source-pill .num {
      flex-shrink: 0;
      border: 1px solid var(--line);
      background: white;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 700;
      color: var(--ink);
    }

    .error-box {
      margin-top: 10px;
      border: 1px solid var(--line);
      background: white;
      border-radius: 16px;
      padding: 16px;
      min-height: 132px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 12px;
    }
    .error-box .desc { font-size: 13px; color: var(--muted); line-height: 1.6; }
    .raw-block {
      margin-top: 12px;
      max-height: 200px;
      white-space: pre-wrap;
      word-break: break-all;
      display: none;
    }
    .raw-block.open { display: block; }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="container">
      <h1>AI 获客系统</h1>
      <nav>
        <a href="/">扫描</a>
        <a href="/enrich.html">补全</a>
        <a href="/pipeline.html">全流程</a>
        <a href="/resources.html">资源中心</a>
        <a href="/public-scan.html">公开 API</a>
        <a href="/public-scan-logs.html" class="active">调用记录</a>
        <a href="/api-doc">API 文档</a>
      </nav>
    </div>
  </header>

  <div class="container">
    <div class="panel">
      <div class="panel-head">
        <div>
          <h2>公开 API 调用记录</h2>
          <p class="panel-sub">
            服务端分页（每页 20），列表仅瘦字段；详情按需加载。配置了 <code>SERVICE_API_KEY</code> 时需鉴权。
          </p>
        </div>
        <span id="authBadge" class="auth-badge">
          <span class="auth-dot"></span>
          <span id="authBadgeText">检测 SERVICE_API_KEY…</span>
        </span>
      </div>

      <div class="filters">
        <div class="field">
          <label>SERVICE_API_KEY</label>
          <input type="password" id="apiKey" placeholder="与 .env 中 SERVICE_API_KEY 一致" autocomplete="off">
        </div>
        <div class="field">
          <label>关键词</label>
          <input type="text" id="fKeyword" placeholder="模糊匹配">
        </div>
        <div class="field">
          <label>国家</label>
          <input type="text" id="fCountry" placeholder="TH / 泰国">
        </div>
        <div class="field">
          <label>用户</label>
          <input type="text" id="fUser" placeholder="ID / 名称 / 邮箱">
        </div>
        <div class="field">
          <label>开始时间</label>
          <input type="datetime-local" id="fFrom">
        </div>
        <div class="field">
          <label>结束时间</label>
          <input type="datetime-local" id="fTo">
        </div>
        <button class="btn btn-primary" id="searchBtn" type="button">查询</button>
        <button class="btn btn-outline" id="resetBtn" type="button">重置</button>
      </div>

      <div id="statusBar" class="status-bar"></div>

      <div class="table-shell">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>时间</th>
                <th>用户</th>
                <th>关键词</th>
                <th>国家</th>
                <th>返回条数</th>
                <th>状态</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="tbody">
              <tr><td colspan="7" style="color:#94a3b8;text-align:center;padding:32px">加载中…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="pager">
        <div class="meta" id="pagerMeta">—</div>
        <div class="actions">
          <button class="btn btn-outline" id="prevBtn" type="button" disabled>上一页</button>
          <button class="btn btn-outline" id="nextBtn" type="button" disabled>下一页</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="modal">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-scroll" id="modalBody">
        <div class="empty">加载中…</div>
      </div>
    </div>
  </div>

  <script>
    const API = '';
    const API_KEY_STORAGE = 'aihuokeagent.publicScan.apiKey';
    const PAGE_SIZE = 20;
    let page = 1;
    let total = 0;

    function authHeaders() {
      const headers = { Accept: 'application/json' };
      const key = document.getElementById('apiKey').value.trim();
      if (key) {
        headers['Authorization'] = `Bearer ${key}`;
        headers['X-Api-Key'] = key;
        sessionStorage.setItem(API_KEY_STORAGE, key);
      }
      return headers;
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s == null ? '' : String(s);
      return d.innerHTML;
    }

    function showStatus(msg, type) {
      const el = document.getElementById('statusBar');
      el.className = 'status-bar status-' + type;
      el.textContent = msg;
    }

    function hideStatus() {
      const el = document.getElementById('statusBar');
      el.className = 'status-bar';
      el.textContent = '';
    }

    function toIsoLocal(value) {
      if (!value) return '';
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return value;
      return d.toISOString();
    }

    function formatTime(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return String(iso);
      return d.toLocaleString();
    }

    function tag(text) {
      const t = String(text || '').trim();
      if (!t) return '';
      return `<span class="tag">${esc(t)}</span>`;
    }

    function tagsOrEmpty(values, emptyText) {
      const list = (values || []).map((v) => String(v || '').trim()).filter(Boolean);
      if (!list.length) return `<div class="empty">${esc(emptyText)}</div>`;
      return `<div class="tag-wrap">${list.map(tag).join('')}</div>`;
    }

    async function loadAuthStatus() {
      const badge = document.getElementById('authBadge');
      const text = document.getElementById('authBadgeText');
      const apiKeyInput = document.getElementById('apiKey');
      try {
        const res = await fetch(`${API}/api/health`, { cache: 'no-store' });
        const data = await res.json();
        const required = Boolean(data.authRequired);
        badge.className = 'auth-badge ' + (required ? 'on' : 'off');
        text.textContent = required
          ? 'SERVICE_API_KEY 已配置（请求需鉴权）'
          : 'SERVICE_API_KEY 未配置（本地可直接调用）';
        if (typeof data.apiKey === 'string' && data.apiKey.trim()) {
          apiKeyInput.value = data.apiKey.trim();
          sessionStorage.setItem(API_KEY_STORAGE, apiKeyInput.value);
        } else if (!apiKeyInput.value) {
          const saved = sessionStorage.getItem(API_KEY_STORAGE) || '';
          if (saved) apiKeyInput.value = saved;
        }
      } catch {
        badge.className = 'auth-badge err';
        text.textContent = '无法检测 SERVICE_API_KEY 状态';
      }
    }

    function buildQuery() {
      const params = new URLSearchParams();
      params.set('page', String(page));
      params.set('pageSize', String(PAGE_SIZE));
      const keyword = document.getElementById('fKeyword').value.trim();
      const country = document.getElementById('fCountry').value.trim();
      const user = document.getElementById('fUser').value.trim();
      const from = toIsoLocal(document.getElementById('fFrom').value);
      const to = toIsoLocal(document.getElementById('fTo').value);
      if (keyword) params.set('keyword', keyword);
      if (country) params.set('country', country);
      if (user) params.set('user', user);
      if (from) params.set('from', from);
      if (to) params.set('to', to);
      return params;
    }

    function renderRows(items) {
      const tbody = document.getElementById('tbody');
      if (!items.length) {
        tbody.innerHTML = '<tr><td colspan="7" style="color:#94a3b8;text-align:center;padding:32px">暂无记录</td></tr>';
        return;
      }
      tbody.innerHTML = items.map((item) => {
        const userLabel = item.userName || item.userId || '—';
        const userSub = item.userId && item.userName
          ? `<div class="user-sub">${esc(item.userId)}</div>`
          : '';
        return `<tr>
          <td>${esc(formatTime(item.createdAt))}</td>
          <td><div>${esc(userLabel)}</div>${userSub}</td>
          <td>${esc(item.keyword || '—')}</td>
          <td>${esc(item.country || item.countryCode || '—')}</td>
          <td>${esc(item.resultCount ?? 0)}</td>
          <td><span class="pill ${item.success ? 'pill-ok' : 'pill-err'}">${item.success ? '成功' : '失败'}</span></td>
          <td><button class="btn-link" type="button" data-id="${esc(item.id)}">详情</button></td>
        </tr>`;
      }).join('');
      tbody.querySelectorAll('button[data-id]').forEach((btn) => {
        btn.addEventListener('click', () => openDetail(btn.getAttribute('data-id')));
      });
    }

    function renderPager() {
      const pages = Math.max(1, Math.ceil(total / PAGE_SIZE));
      document.getElementById('pagerMeta').textContent = `第 ${page} / ${pages} 页 · 共 ${total} 条 · 每页 ${PAGE_SIZE}`;
      document.getElementById('prevBtn').disabled = page <= 1;
      document.getElementById('nextBtn').disabled = page >= pages;
    }

    async function loadLogs() {
      const btn = document.getElementById('searchBtn');
      btn.disabled = true;
      hideStatus();
      try {
        const res = await fetch(`${API}/api/public/scan/logs?${buildQuery()}`, {
          headers: authHeaders(),
          cache: 'no-store',
        });
        const data = await res.json();
        if (!data.success) {
          showStatus(`加载失败 (${res.status}): ${data.error || 'unknown'}`, 'error');
          return;
        }
        total = Number(data.data.total || 0);
        page = Number(data.data.page || page);
        renderRows(data.data.items || []);
        renderPager();
      } catch (e) {
        showStatus(`请求失败: ${e.message}`, 'error');
      } finally {
        btn.disabled = false;
      }
    }

    function remainingLabel(value) {
      if (value === -1) return '不限制';
      if (value === null || value === undefined || value === '') return '—';
      return String(value);
    }

    function renderDetail(r) {
      const statusText = r.success ? '成功' : '失败';
      const durationSec = ((r.durationMs || 0) / 1000).toFixed(1);
      const remainingText = remainingLabel(r.monthlyLeadsRemaining);
      const userTags = [
        r.userName,
        r.userId,
        r.userEmail,
        r.userPhone,
        r.userCompany,
      ];
      const paramTags = [
        r.keyword ? `关键词：${r.keyword}` : '',
        r.country ? `国家：${r.country}` : '',
        r.countryCode ? `国家码：${r.countryCode}` : '',
        r.triggerSource ? `触发：${r.triggerSource}` : '',
        r.clientApp ? `客户端：${r.clientApp}` : '',
      ];
      const hasError = !r.success || Boolean(r.errorMessage);

      return `
        <div class="modal-top">
          <div>
            <div class="modal-title" id="modalTitle">调用详情</div>
            <div class="modal-meta">${esc(statusText)} · ${esc(formatTime(r.createdAt))} · 耗时 ${esc(durationSec)}s</div>
          </div>
          <button class="icon-close" type="button" id="closeModal" aria-label="关闭">×</button>
        </div>

        <div class="stat-row">
          <div class="stat-card"><span class="label">返回条数</span><span class="value">${esc(r.resultCount ?? 0)}</span></div>
          <div class="stat-card"><span class="label">合格</span><span class="value">${esc(r.totalQualified ?? 0)}</span></div>
          <div class="stat-card"><span class="label">待验证</span><span class="value">${esc(r.totalReview ?? 0)}</span></div>
        </div>

        <div class="cols-2">
          <section>
            <div class="section-title">调用参数</div>
            <div class="section-box">
              ${tagsOrEmpty(paramTags, '本次没有参数信息。')}
            </div>
          </section>
          <section>
            <div class="section-title">调用用户</div>
            <div class="section-box">
              ${tagsOrEmpty(userTags, '未附带登录用户信息。')}
            </div>
          </section>
        </div>

        <div class="cols-2">
          <section>
            <div class="section-title">授权与配额</div>
            <div class="section-box">
              <div class="tag-wrap" style="margin-bottom:12px">
                <div class="source-pill"><span class="name">当月获客余量</span><span class="num">${esc(remainingText)}</span></div>
                <div class="source-pill"><span class="name">耗时(秒)</span><span class="num">${esc(durationSec)}</span></div>
              </div>
              <div class="kv">
                <div class="k">授权码</div><div class="v">${esc(r.licenseCode || '—')}</div>
                <div class="k">授权到期</div><div class="v">${esc(formatTime(r.licenseExpiresAt))}</div>
                <div class="k">runId</div><div class="v">${esc(r.runId || '—')}</div>
                <div class="k">discoveryRunId</div><div class="v">${esc(r.discoveryRunId || '—')}</div>
              </div>
            </div>
          </section>
          <section>
            <div class="section-title">异常与原文</div>
            <div class="error-box">
              <div class="desc">
                ${hasError
                  ? `本次调用失败或带有错误信息：${esc(r.errorMessage || '未知错误')}`
                  : '本次没有异常日志。'}
              </div>
              <button class="btn btn-outline" type="button" id="toggleRaw">
                查看原始 clientContext
              </button>
            </div>
            <pre class="raw-block" id="rawBlock">${esc(JSON.stringify(r.clientContext || {}, null, 2))}</pre>
          </section>
        </div>
      `;
    }

    async function openDetail(id) {
      const modal = document.getElementById('modal');
      const body = document.getElementById('modalBody');
      body.innerHTML = '<div class="empty">加载中…</div>';
      modal.classList.add('open');
      try {
        const res = await fetch(`${API}/api/public/scan/logs/${encodeURIComponent(id)}`, {
          headers: authHeaders(),
          cache: 'no-store',
        });
        const data = await res.json();
        if (!data.success) {
          body.innerHTML = `<div class="empty" style="color:#be123c">${esc(data.error || '加载失败')}</div>`;
          return;
        }
        body.innerHTML = renderDetail(data.data);
        document.getElementById('closeModal').addEventListener('click', closeModal);
        const toggle = document.getElementById('toggleRaw');
        const raw = document.getElementById('rawBlock');
        toggle.addEventListener('click', () => {
          const open = raw.classList.toggle('open');
          toggle.textContent = open ? '收起原始 clientContext' : '查看原始 clientContext';
        });
      } catch (e) {
        body.innerHTML = `<div class="empty" style="color:#be123c">${esc(e.message)}</div>`;
      }
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
    }

    document.getElementById('searchBtn').addEventListener('click', () => {
      page = 1;
      loadLogs();
    });
    document.getElementById('resetBtn').addEventListener('click', () => {
      document.getElementById('fKeyword').value = '';
      document.getElementById('fCountry').value = '';
      document.getElementById('fUser').value = '';
      document.getElementById('fFrom').value = '';
      document.getElementById('fTo').value = '';
      page = 1;
      loadLogs();
    });
    document.getElementById('prevBtn').addEventListener('click', () => {
      if (page <= 1) return;
      page -= 1;
      loadLogs();
    });
    document.getElementById('nextBtn').addEventListener('click', () => {
      const pages = Math.max(1, Math.ceil(total / PAGE_SIZE));
      if (page >= pages) return;
      page += 1;
      loadLogs();
    });
    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') closeModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });
    document.getElementById('apiKey').addEventListener('change', () => {
      const key = document.getElementById('apiKey').value.trim();
      if (key) sessionStorage.setItem(API_KEY_STORAGE, key);
    });

    loadAuthStatus().then(() => loadLogs());
  </script>
</body>
</html>
