<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 获客 - 全流程</title>
  <link rel="stylesheet" href="/theme.css">
  <style>
    #results-section { display: none; }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="container">
      <h1>AI 获客系统</h1>
      <nav>
        <a href="/">扫描</a>
        <a href="/enrich.html">补全</a>
        <a href="/pipeline.html" class="active">全流程</a>
        <a href="/public-scan.html">公开 API</a>
        <a href="/public-scan-logs.html">调用记录</a>
        <a href="/resources.html">资源中心</a>
      </nav>
    </div>
  </header>

  <div class="container">
    <!-- 配置 -->
    <div class="card">
      <h2>一键全流程 (SCAN → ENRICH)</h2>
      <div class="form-row">
        <div class="form-group">
          <label>公司名称</label>
          <input type="text" id="companyName" placeholder="例：VertaX">
        </div>
        <div class="form-group">
          <label>行业</label>
          <input type="text" id="industry" placeholder="例：Industrial Automation">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex:2">
          <label>搜索关键词（留空则 AI 自动生成）</label>
          <textarea id="keywords" placeholder="每行一个关键词"></textarea>
        </div>
        <div class="form-group">
          <label>目标国家</label>
          <input type="text" id="countries" placeholder="例：Thailand, Vietnam">
          <label style="margin-top:12px">补全前 N 个结果</label>
          <input type="number" id="enrichTopN" value="10" min="1" max="50">
        </div>
      </div>
      <div style="margin-top:16px;text-align:center">
        <button class="btn btn-primary btn-lg" id="runBtn" onclick="runPipeline()">🚀 一键执行全流程</button>
      </div>
    </div>

    <!-- 进度步骤 -->
    <div class="pipeline-steps" id="steps" style="display:none">
      <div class="step" id="step-scan">
        <div class="step-icon">🔍</div>
        <div class="step-label">SCAN 扫描</div>
        <div class="step-status" id="step-scan-status">等待中</div>
      </div>
      <div class="step" id="step-enrich">
        <div class="step-icon">🧠</div>
        <div class="step-label">ENRICH 补全</div>
        <div class="step-status" id="step-enrich-status">等待中</div>
      </div>
      <div class="step" id="step-done">
        <div class="step-icon">✅</div>
        <div class="step-label">完成</div>
        <div class="step-status" id="step-done-status">等待中</div>
      </div>
    </div>

    <!-- 状态 -->
    <div id="statusBar" class="status-bar status-info" style="display:none"></div>

    <!-- 结果 -->
    <div id="results-section">
      <!-- 统计 -->
      <div class="summary-stats" id="summaryStats"></div>

      <!-- 扫描结果 -->
      <div class="card" id="scanResultsCard" style="display:none">
        <h2>扫描发现的企业</h2>
        <div id="scanResults"></div>
      </div>

      <!-- 补全结果 -->
      <div class="card" id="enrichResultsCard" style="display:none">
        <h2>情报补全结果</h2>
        <div id="enrichResults"></div>
      </div>
    </div>
  </div>

  <script src="/auth.js"></script>
  <script>
    const API = '';

    async function runPipeline() {
      const btn = document.getElementById('runBtn');
      btn.disabled = true;
      btn.textContent = '⏳ 执行中...';

      document.getElementById('steps').style.display = 'flex';
      document.getElementById('results-section').style.display = 'block';
      setStep('scan', 'active', '执行中...');
      showStatus('正在执行全流程...', 'info');

      const keywordsText = document.getElementById('keywords').value.trim();
      const keywords = keywordsText ? keywordsText.split('\n').map(k => k.trim()).filter(Boolean) : [];
      const countriesText = document.getElementById('countries').value.trim();
      const countries = countriesText ? countriesText.split(',').map(c => c.trim()).filter(Boolean) : [];

      const body = {
        companyName: document.getElementById('companyName').value.trim() || undefined,
        industry: document.getElementById('industry').value.trim() || undefined,
        keywords: keywords.length ? keywords : undefined,
        countries: countries.length ? countries : undefined,
        enrichTopN: parseInt(document.getElementById('enrichTopN').value, 10) || 10,
      };

      try {
        const res = await VertaxAuth.apiFetch(`${API}/api/pipeline/run`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();

        if (data.success) {
          const result = data.data;
          setStep('scan', 'done', `发现 ${result.scanResult.totalFound}`);
          setStep('enrich', 'done', `补全 ${result.enrichResults.length}`);
          setStep('done', 'done', `${(result.totalDuration/1000).toFixed(1)}s`);
          showStatus(`✅ 全流程完成！耗时 ${(result.totalDuration/1000).toFixed(1)}s`, 'success');
          renderPipelineResults(result);
        } else {
          showStatus(`❌ 失败: ${data.error}`, 'error');
          setStep('scan', '', '失败');
        }
      } catch (e) {
        showStatus(`❌ 请求失败: ${e.message}`, 'error');
      }

      btn.disabled = false;
      btn.textContent = '🚀 一键执行全流程';
    }

    function renderPipelineResults(result) {
      // 统计
      const totalEmails = result.enrichResults.reduce((s, r) => s + (r.emails?.length || 0), 0);
      const totalDMs = result.enrichResults.reduce((s, r) => s + (r.decisionMakers?.length || 0), 0);
      const avgConf = result.enrichResults.length
        ? (result.enrichResults.reduce((s, r) => s + (r.confidenceScore || 0), 0) / result.enrichResults.length * 100).toFixed(0)
        : 0;

      document.getElementById('summaryStats').innerHTML = `
        <div class="stat-box"><div class="stat-value">${result.scanResult.totalFound}</div><div class="stat-label">发现企业</div></div>
        <div class="stat-box"><div class="stat-value">${result.enrichResults.length}</div><div class="stat-label">补全企业</div></div>
        <div class="stat-box"><div class="stat-value">${totalEmails}</div><div class="stat-label">找到邮箱</div></div>
        <div class="stat-box"><div class="stat-value">${totalDMs}</div><div class="stat-label">决策人</div></div>
        <div class="stat-box"><div class="stat-value">${avgConf}%</div><div class="stat-label">平均置信度</div></div>
      `;

      // 补全结果详情
      if (result.enrichResults.length > 0) {
        document.getElementById('enrichResultsCard').style.display = 'block';
        let html = '<div class="result-grid">';
        for (const r of result.enrichResults) {
          const confClass = r.confidenceScore >= 0.6 ? 'conf-high' : r.confidenceScore >= 0.3 ? 'conf-mid' : 'conf-low';
          const conf = ((r.confidenceScore || 0) * 100).toFixed(0);
          html += `<div class="result-item">
            <h4>${esc(r.companyName)} <span class="confidence ${confClass}">${conf}%</span></h4>
            ${r.website ? `<div>🌐 <a href="${esc(r.website)}" target="_blank">${esc(r.website)}</a></div>` : ''}
            ${r.emails?.length ? `<div>📧 ${r.emails.map(esc).join(', ')}</div>` : ''}
            ${r.decisionMakers?.length ? `<div>👤 ${r.decisionMakers.length} 位决策人</div>` : ''}
            ${r.description ? `<div class="meta">${esc(r.description.slice(0, 100))}...</div>` : ''}
          </div>`;
        }
        html += '</div>';
        document.getElementById('enrichResults').innerHTML = html;
      }
    }

    function setStep(step, state, text) {
      const el = document.getElementById(`step-${step}`);
      el.className = `step ${state}`;
      document.getElementById(`step-${step}-status`).textContent = text;
    }

    function showStatus(msg, type) {
      const bar = document.getElementById('statusBar');
      bar.textContent = msg;
      bar.className = `status-bar status-${type}`;
      bar.style.display = 'block';
    }

    function esc(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    VertaxAuth.ensureApiKey(API);
  </script>
</body>
</html>
