<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>获客资源中心</title>
  <link rel="stylesheet" href="/theme.css">
  <style>
    .plan { margin-top: 16px; min-height: 70px; white-space: pre-wrap; }
    .catalog .table-wrap, .metrics .table-wrap {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: white;
      overflow: auto;
    }
    .catalog table, .metrics table { min-width: 760px; }
  </style>
</head>
<body>
  <a class="sr-only" href="#main">跳到主要内容</a>

  <header class="app-header">
    <div class="container">
      <h1>AI 获客系统</h1>
      <nav>
        <a href="/">扫描</a>
        <a href="/enrich.html">补全</a>
        <a href="/pipeline.html">全流程</a>
        <a href="/public-scan.html">公开 API</a>
        <a href="/public-scan-logs.html">调用记录</a>
        <a href="/resources.html" class="active">资源中心</a>
      </nav>
    </div>
  </header>

  <main class="shell" id="main">
    <header class="topbar">
      <div>
        <h1>获客资源中心</h1>
        <p class="muted">管理国家市场包、行业知识包、数据源能力和匿名运行绩效。</p>
      </div>
      <nav class="actions" aria-label="页面操作">
        <a class="btn btn-secondary" href="/">返回发现</a>
        <button class="btn btn-primary" id="reloadButton" type="button">重新加载资源</button>
      </nav>
    </header>

    <section class="grid" aria-label="资源概览">
      <article class="card summary"><span class="muted">市场包</span><strong id="marketCount">—</strong></article>
      <article class="card summary"><span class="muted">行业包</span><strong id="industryCount">—</strong></article>
      <article class="card summary"><span class="muted">数据源</span><strong id="sourceCount">—</strong></article>

      <section class="card planner" aria-labelledby="plannerTitle">
        <h2 id="plannerTitle">Discovery Planner</h2>
        <p class="muted">验证“国家 × 行业 × 关键词”将如何组合资源。</p>
        <div class="form-grid">
          <div><label for="country">国家</label><select id="country"></select></div>
          <div><label for="industry">行业</label><select id="industry"></select></div>
          <div><label for="keywords">可选关键词（逗号分隔）</label><input id="keywords" placeholder="例如 pet hospital, veterinary clinic"></div>
          <button class="btn btn-primary" id="planButton" type="button">生成策略</button>
        </div>
        <pre class="plan" id="planOutput" aria-live="polite">选择市场和行业后生成策略。</pre>
      </section>

      <section class="card catalog" aria-labelledby="catalogTitle">
        <h2 id="catalogTitle">资源目录</h2>
        <div class="tabs" role="tablist" aria-label="资源类型">
          <button class="tab" role="tab" aria-selected="true" data-tab="sources">数据源</button>
          <button class="tab" role="tab" aria-selected="false" data-tab="markets">市场包</button>
          <button class="tab" role="tab" aria-selected="false" data-tab="industries">行业包</button>
        </div>
        <div class="table-wrap"><table><thead id="catalogHead"></thead><tbody id="catalogBody"></tbody></table></div>
      </section>

      <section class="card metrics" aria-labelledby="metricsTitle">
        <h2 id="metricsTitle">来源历史表现</h2>
        <p class="muted">仅展示匿名运行统计，不包含租户候选企业或联系人。</p>
        <div class="table-wrap" style="margin-top:16px">
          <table>
            <thead>
              <tr>
                <th>来源</th><th>国家</th><th>行业</th><th>运行</th><th>抓取/保留</th><th>合格率</th><th>平均耗时</th>
              </tr>
            </thead>
            <tbody id="metricsBody"></tbody>
          </table>
        </div>
      </section>
    </section>
  </main>
  <script src="/auth.js"></script>
  <script>
    let catalog={markets:[],industries:[],sources:[]};let activeTab='sources';
    const esc=value=>String(value??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    async function api(path,options){const response=await VertaxAuth.apiFetch(path,options);const result=await response.json();if(!result.success)throw new Error(result.error||'请求失败');return result.data}
    async function load(){catalog=await api('/api/resources');marketCount.textContent=catalog.markets.length;industryCount.textContent=catalog.industries.length;sourceCount.textContent=catalog.sources.length;country.innerHTML=catalog.markets.map(x=>`<option value="${esc(x.countryCode)}">${esc(x.countryName)} (${esc(x.countryCode)})</option>`).join('');industry.innerHTML=catalog.industries.map(x=>`<option value="${esc(x.id)}">${esc(x.name)}</option>`).join('');renderCatalog();await loadMetrics()}
    function badge(status){return `<span class="badge ${esc(status)}">${esc(status)}</span>`}
    function renderCatalog(){
      if(activeTab==='sources'){catalogHead.innerHTML='<tr><th>数据源</th><th>状态</th><th>权威性</th><th>覆盖</th><th>字段</th><th>基线质量</th></tr>';catalogBody.innerHTML=catalog.sources.map(x=>`<tr><td><strong>${esc(x.name)}</strong><br><span class="muted">${esc(x.code)}</span></td><td>${badge(x.status)}</td><td>${esc(x.authority)}</td><td>${esc(x.countries.join(', '))}<br><span class="muted">${esc(x.industries.join(', '))}</span></td><td>${esc(x.fields.slice(0,5).join(', '))}</td><td>${Math.round(x.qualityBaseline*100)}%</td></tr>`).join('');
      }else if(activeTab==='markets'){catalogHead.innerHTML='<tr><th>市场</th><th>版本</th><th>语言</th><th>区域集群</th><th>首选来源</th></tr>';catalogBody.innerHTML=catalog.markets.map(x=>`<tr><td><strong>${esc(x.countryName)}</strong> (${esc(x.countryCode)})</td><td>${esc(x.version)} ${badge(x.status)}</td><td>${esc(x.languages.map(v=>v.code).join(', '))}</td><td>${esc(x.clusters.map(v=>v.name).join(', '))}</td><td>${esc(x.sourceCodes.join(', '))}</td></tr>`).join('');
      }else{catalogHead.innerHTML='<tr><th>行业包</th><th>版本</th><th>实体</th><th>关键词</th><th>来源类型</th></tr>';catalogBody.innerHTML=catalog.industries.map(x=>`<tr><td><strong>${esc(x.name)}</strong><br><span class="muted">${esc(x.id)}</span></td><td>${esc(x.version)} ${badge(x.status)}</td><td>${esc(x.entityType)}</td><td>${esc(x.keywords.join(', '))}</td><td>${esc(x.sourceTypes.join(', '))}</td></tr>`).join('')}
    }
    async function makePlan(){planOutput.textContent='正在规划...';try{const data=await api('/api/resources/plan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({countries:[country.value],industry:industry.value,keywords:keywords.value.split(',').map(v=>v.trim()).filter(Boolean)})});planOutput.textContent=JSON.stringify(data,null,2)}catch(error){planOutput.textContent=`规划失败：${error.message}`}}
    async function loadMetrics(){const rows=await api('/api/resources/metrics');metricsBody.innerHTML=rows.length?rows.map(x=>`<tr><td><strong>${esc(x.sourceCode)}</strong></td><td>${esc(x.countryCode||'—')}</td><td>${esc(x.industryPackId||'—')}</td><td>${x.runs}</td><td>${x.fetched} / ${x.found}</td><td>${Math.round(x.qualificationRate*100)}%</td><td>${(x.avgDurationMs/1000).toFixed(1)}s</td></tr>`).join(''):'<tr><td colspan="7" class="empty">运行发现任务后，这里将出现来源表现。</td></tr>'}
    document.querySelectorAll('.tab').forEach(tab=>tab.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.setAttribute('aria-selected','false'));tab.setAttribute('aria-selected','true');activeTab=tab.dataset.tab;renderCatalog()}));
    planButton.addEventListener('click',makePlan);reloadButton.addEventListener('click',async()=>{reloadButton.disabled=true;try{await api('/api/resources/reload',{method:'POST'});await load()}finally{reloadButton.disabled=false}});
    VertaxAuth.ensureApiKey('').then(()=>load()).catch(error=>{planOutput.textContent=`资源加载失败：${error.message}`});
  </script>
</body>
</html>
