<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>获客资源中心</title>
  <style>
    :root {
      --primary:#2563eb; --primary-soft:#eff6ff; --success:#047857; --success-soft:#ecfdf5;
      --warning:#b45309; --warning-soft:#fffbeb; --danger:#b91c1c; --bg:#f8fafc;
      --surface:#fff; --border:#e2e8f0; --text:#172033; --muted:#64748b;
      --radius:12px; --shadow:0 8px 24px rgba(15,23,42,.06); --focus:0 0 0 3px rgba(37,99,235,.22);
    }
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font:16px/1.5 Inter,system-ui,-apple-system,"Segoe UI",sans-serif}
    a{color:inherit}.shell{max-width:1240px;margin:auto;padding:24px}.topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;margin-bottom:24px}
    h1{font-size:30px;line-height:1.2;margin:0 0 8px}h2{font-size:19px;margin:0}.muted{color:var(--muted);margin:0}.actions{display:flex;gap:8px;flex-wrap:wrap}
    button,.button{min-height:44px;border-radius:9px;border:1px solid var(--border);padding:0 16px;background:var(--surface);font:inherit;font-weight:650;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;transition:transform .15s,box-shadow .15s,border-color .15s}
    button:hover,.button:hover{transform:translateY(-1px);box-shadow:var(--shadow)}button:focus-visible,.button:focus-visible,input:focus-visible,select:focus-visible{outline:none;box-shadow:var(--focus)}button.primary{background:var(--primary);border-color:var(--primary);color:#fff}
    .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px}.summary{grid-column:span 4}.summary strong{display:block;font-size:30px;margin-top:8px}.planner{grid-column:span 12}.catalog,.metrics{grid-column:span 12}
    .form-grid{display:grid;grid-template-columns:1fr 1fr 2fr auto;gap:12px;margin-top:16px;align-items:end}label{display:block;font-size:13px;font-weight:700;margin-bottom:6px}input,select{width:100%;min-height:44px;border:1px solid var(--border);border-radius:9px;background:#fff;padding:0 12px;font:inherit}
    .plan{margin-top:16px;background:#0f172a;color:#e2e8f0;border-radius:10px;padding:16px;white-space:pre-wrap;overflow:auto;min-height:70px;font:13px/1.65 ui-monospace,SFMono-Regular,Consolas,monospace}
    .tabs{display:flex;gap:8px;margin:16px 0 12px;flex-wrap:wrap}.tab[aria-selected="true"]{background:var(--primary-soft);border-color:#93c5fd;color:#1d4ed8}.table-wrap{overflow:auto;border:1px solid var(--border);border-radius:10px}table{width:100%;border-collapse:collapse;min-width:760px}th,td{text-align:left;padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:top}th{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);background:#f8fafc}tr:last-child td{border-bottom:0}
    .badge{display:inline-flex;padding:3px 9px;border-radius:999px;font-size:12px;font-weight:750}.active{background:var(--success-soft);color:var(--success)}.research{background:var(--warning-soft);color:var(--warning)}.disabled{background:#f1f5f9;color:var(--muted)}.empty{text-align:center;color:var(--muted);padding:28px}.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
    @media(max-width:850px){.shell{padding:16px}.topbar{flex-direction:column}.summary{grid-column:span 12}.form-grid{grid-template-columns:1fr}.form-grid button{width:100%}}
  </style>
</head>
<body>
  <a class="sr-only" href="#main">跳到主要内容</a>
  <main class="shell" id="main">
    <header class="topbar">
      <div><h1>获客资源中心</h1><p class="muted">管理国家市场包、行业知识包、数据源能力和匿名运行绩效。</p></div>
      <nav class="actions" aria-label="页面操作"><a class="button" href="/">返回发现</a><button id="reloadButton" type="button">重新加载资源</button></nav>
    </header>

    <section class="grid" aria-label="资源概览">
      <article class="card summary"><span class="muted">市场包</span><strong id="marketCount">—</strong></article>
      <article class="card summary"><span class="muted">行业包</span><strong id="industryCount">—</strong></article>
      <article class="card summary"><span class="muted">数据源</span><strong id="sourceCount">—</strong></article>

      <section class="card planner" aria-labelledby="plannerTitle">
        <h2 id="plannerTitle">Discovery Planner</h2><p class="muted">验证“国家 × 行业 × 关键词”将如何组合资源。</p>
        <div class="form-grid">
          <div><label for="country">国家</label><select id="country"></select></div>
          <div><label for="industry">行业</label><select id="industry"></select></div>
          <div><label for="keywords">可选关键词（逗号分隔）</label><input id="keywords" placeholder="例如 pet hospital, veterinary clinic"></div>
          <button class="primary" id="planButton" type="button">生成策略</button>
        </div>
        <pre class="plan" id="planOutput" aria-live="polite">选择市场和行业后生成策略。</pre>
      </section>

      <section class="card catalog" aria-labelledby="catalogTitle">
        <h2 id="catalogTitle">资源目录</h2>
        <div class="tabs" role="tablist" aria-label="资源类型">
          <button class="tab" role="tab" aria-selected="true" data-tab="sources">数据源</button>
          <button class="tab" role="tab" aria-selected="false" data-tab="markets">市场包</button>
          <button class="tab" role="tab" aria-selected="false" data-tab="industries">行业包</button>
        </div>
        <div class="table-wrap"><table><thead id="catalogHead"></thead><tbody id="catalogBody"></tbody></table></div>
      </section>

      <section class="card metrics" aria-labelledby="metricsTitle">
        <h2 id="metricsTitle">来源历史表现</h2><p class="muted">仅展示匿名运行统计，不包含租户候选企业或联系人。</p>
        <div class="table-wrap" style="margin-top:16px"><table><thead><tr><th>来源</th><th>国家</th><th>行业</th><th>运行</th><th>抓取/保留</th><th>合格率</th><th>平均耗时</th></tr></thead><tbody id="metricsBody"></tbody></table></div>
      </section>
    </section>
  </main>
  <script>
    let catalog={markets:[],industries:[],sources:[]};let activeTab='sources';
    const esc=value=>String(value??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    async function api(path,options){const response=await fetch(path,options);const result=await response.json();if(!result.success)throw new Error(result.error||'请求失败');return result.data}
    async function load(){catalog=await api('/api/resources');marketCount.textContent=catalog.markets.length;industryCount.textContent=catalog.industries.length;sourceCount.textContent=catalog.sources.length;country.innerHTML=catalog.markets.map(x=>`<option value="${esc(x.countryCode)}">${esc(x.countryName)} (${esc(x.countryCode)})</option>`).join('');industry.innerHTML=catalog.industries.map(x=>`<option value="${esc(x.id)}">${esc(x.name)}</option>`).join('');renderCatalog();await loadMetrics()}
    function badge(status){return `<span class="badge ${esc(status)}">${esc(status)}</span>`}
    function renderCatalog(){
      if(activeTab==='sources'){catalogHead.innerHTML='<tr><th>数据源</th><th>状态</th><th>权威性</th><th>覆盖</th><th>字段</th><th>基线质量</th></tr>';catalogBody.innerHTML=catalog.sources.map(x=>`<tr><td><strong>${esc(x.name)}</strong><br><span class="muted">${esc(x.code)}</span></td><td>${badge(x.status)}</td><td>${esc(x.authority)}</td><td>${esc(x.countries.join(', '))}<br><span class="muted">${esc(x.industries.join(', '))}</span></td><td>${esc(x.fields.slice(0,5).join(', '))}</td><td>${Math.round(x.qualityBaseline*100)}%</td></tr>`).join('');
      }else if(activeTab==='markets'){catalogHead.innerHTML='<tr><th>市场</th><th>版本</th><th>语言</th><th>区域集群</th><th>首选来源</th></tr>';catalogBody.innerHTML=catalog.markets.map(x=>`<tr><td><strong>${esc(x.countryName)}</strong> (${esc(x.countryCode)})</td><td>${esc(x.version)} ${badge(x.status)}</td><td>${esc(x.languages.map(v=>v.code).join(', '))}</td><td>${esc(x.clusters.map(v=>v.name).join(', '))}</td><td>${esc(x.sourceCodes.join(', '))}</td></tr>`).join('');
      }else{catalogHead.innerHTML='<tr><th>行业包</th><th>版本</th><th>实体</th><th>关键词</th><th>来源类型</th></tr>';catalogBody.innerHTML=catalog.industries.map(x=>`<tr><td><strong>${esc(x.name)}</strong><br><span class="muted">${esc(x.id)}</span></td><td>${esc(x.version)} ${badge(x.status)}</td><td>${esc(x.entityType)}</td><td>${esc(x.keywords.join(', '))}</td><td>${esc(x.sourceTypes.join(', '))}</td></tr>`).join('')}
    }
    async function makePlan(){planOutput.textContent='正在规划...';try{const data=await api('/api/resources/plan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({countries:[country.value],industry:industry.value,keywords:keywords.value.split(',').map(v=>v.trim()).filter(Boolean)})});planOutput.textContent=JSON.stringify(data,null,2)}catch(error){planOutput.textContent=`规划失败：${error.message}`}}
    async function loadMetrics(){const rows=await api('/api/resources/metrics');metricsBody.innerHTML=rows.length?rows.map(x=>`<tr><td><strong>${esc(x.sourceCode)}</strong></td><td>${esc(x.countryCode||'—')}</td><td>${esc(x.industryPackId||'—')}</td><td>${x.runs}</td><td>${x.fetched} / ${x.found}</td><td>${Math.round(x.qualificationRate*100)}%</td><td>${(x.avgDurationMs/1000).toFixed(1)}s</td></tr>`).join(''):'<tr><td colspan="7" class="empty">运行发现任务后，这里将出现来源表现。</td></tr>'}
    document.querySelectorAll('.tab').forEach(tab=>tab.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.setAttribute('aria-selected','false'));tab.setAttribute('aria-selected','true');activeTab=tab.dataset.tab;renderCatalog()}));
    planButton.addEventListener('click',makePlan);reloadButton.addEventListener('click',async()=>{reloadButton.disabled=true;try{await api('/api/resources/reload',{method:'POST'});await load()}finally{reloadButton.disabled=false}});load().catch(error=>{planOutput.textContent=`资源加载失败：${error.message}`});
  </script>
</body>
</html>
